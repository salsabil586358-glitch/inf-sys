function srUpdate(prev,grade){
  const ef=Math.max(MIN_EASE,(prev.easeFactor||2.5)+(EASE_DELTA[grade]||0));
  const days=grade==="again"?1:Math.round((SR_INTERVALS[grade]||1)*ef);
  return{interval:days,easeFactor:ef,nextReview:Date.now()+days*86400000,lapses:grade==="again"?(prev.lapses||0)+1:(prev.lapses||0),lastReview:Date.now()};
}
function getDueCards(cards,srData){
  const now=Date.now();
  return cards.filter(c=>{const d=srData[c.id];return!d||d.nextReview<=now;})
    .sort((a,b)=>(srData[a.id]?.nextReview||0)-(srData[b.id]?.nextReview||0));
}
function daysLabel(ts){
  const diff=ts-Date.now();
  if(diff<=0)return"Maintenant · الآن";
  const d=Math.ceil(diff/86400000);
  return d===1?"Demain · غداً":`Dans ${d}j · بعد ${d} أيام`;
}
function dueCount(){return getDueCards(SR_CARDS,state.srData).length;}

function buildSteps(L){
  const s=[{t:"intro"}];
  L.concepts.forEach((c,i)=>s.push({t:"card",c,i,total:L.concepts.length}));
  L.quizzes.forEach(q=>s.push({t:"quiz",q}));
  s.push({t:"chat"},{t:"expr"});
  const tdData=TD.find(t=>t.lessonId===L.id);
  if(tdData&&(tdData.exercises.length>0||tdData.reflections.length>0))s.push({t:"td",tdData});
  return s;
}

  const t=th();
  return `<button onclick="${onclick}" style="background:${t.surf2};border:1px solid ${t.bdr};color:${t.dim};border-radius:11px;padding:11px 15px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;${extra}">${label}</button>`;

function diffBadge(d){
  const map={facile:[GREEN,"Facile · سهل"],moyen:[GOLD,"Moyen · متوسط"],difficile:[RED,"Difficile · صعب"]};

  return `<span style="font-size:11px;background:${c}22;color:${c};border-radius:100px;padding:3px 10px;font-weight:700;">${l}</span>`;
}

// ─── STEP: QUIZ ───
function stepQuiz(){
  const t=th();const q=state.steps[state.stepIdx].q;const chosen=state.quizChosen;
  const optColor=(i)=>{
    if(chosen===null)return t.bdr;
    if(i===q.ans)return GREEN;
    if(i===chosen)return RED;
    return t.bdr;
  };
  const optBg=(i)=>{
    if(chosen===null)return t.surf;
    if(i===q.ans)return"rgba(52,211,153,.08)";
    if(i===chosen)return"rgba(248,113,113,.08)";
    return t.surf;
  };
  const optColor2=(i)=>{
    if(chosen!==null&&i===q.ans)return GREEN;
    if(chosen===i&&i!==q.ans)return RED;
    return t.txt;
  };
  return `
  ${tag("Question")}
  <div style="font-size:clamp(16px,3vw,22px);font-weight:800;margin-bottom:5px;">${q.qf}</div>
  ${state.showAr?`<div class="ar" style="color:${t.dim};direction:rtl;margin-bottom:20px;font-size:15px;">${q.qa}</div>`:""}
  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
    ${q.of.map((o,i)=>`<button onclick="${chosen===null?`chooseQuiz(${i})`:""}" ${chosen!==null?"disabled":""} style="background:${optBg(i)};border:2px solid ${optColor(i)};border-radius:11px;padding:12px 16px;text-align:left;font-size:13px;font-family:inherit;color:${optColor2(i)};cursor:${chosen!==null?"default":"pointer"};transition:all .15s;">
      <div style="font-weight:600;">${o}</div>
      ${state.showAr?`<div class="ar" style="font-size:12px;color:${t.dim};direction:rtl;margin-top:2px;">${q.oa[i]}</div>`:""}
    </button>`).join("")}
  </div>
  ${chosen!==null?`<div style="border-radius:11px;padding:14px 18px;margin-bottom:14px;background:${chosen===q.ans?"rgba(52,211,153,.07)":"rgba(248,113,113,.07)"};border:1px solid ${chosen===q.ans?"rgba(52,211,153,.3)":"rgba(248,113,113,.3)"};">
    <div style="font-weight:800;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:${chosen===q.ans?GREEN:RED};margin-bottom:5px;">${chosen===q.ans?"✓ Correct !":"✗ Pas tout à fait"}</div>
    <div style="font-size:13px;line-height:1.8;">${q.ef}</div>
    ${state.showAr?`<div class="ar" style="direction:rtl;color:${t.dim};font-size:13px;border-top:1px dashed ${t.bdr};padding-top:7px;margin-top:6px;">${q.ea}</div>`:""}
  </div>`:""}
  <button onclick="nextStep()" ${chosen===null?"disabled":""} style="width:100%;background:${chosen!==null?`linear-gradient(135deg,${A},${A2})`:t.surf2};color:${chosen!==null?"#fff":t.dim};border:1px solid ${t.bdr};border-radius:11px;padding:13px 20px;font-family:inherit;font-size:14px;font-weight:700;cursor:${chosen!==null?"pointer":"default"};opacity:${chosen===null?.4:1};">
    Continuer → التالي
  </button>`;
}

// MAIN RENDER DISPATCHER
// ═══════════════════════════════════════
function render(){
  const t=th();
  document.body.style.background=t.bg;
  document.body.style.color=t.txt;
  if(state.page==="home")renderHome();
  else if(state.page==="done")renderDone();
  else if(state.page==="sr")renderSR();
  else if(state.page==="td-browse")renderTDBrowse();
  else if(state.page==="plan")renderPlan();
  else if(state.page==="lesson")renderLesson();
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function goPage(p){state.page=p;render();}
function toggleDark(){state.dark=!state.dark;render();}
function toggleAr(){state.showAr=!state.showAr;render();}

function startLesson(idx){
  state.lessonIdx=idx;state.stepIdx=0;state.correct=0;state.total=0;
  state.steps=buildSteps(BOOK[idx]);
  state.cardFlipped=false;state.quizChosen=null;
  state.chatText="";state.chatPrompt="";state.chatAnswer="";state.chatCopied=false;state.chatSaved="";
  state.exprText="";state.exprPrompt="";state.exprCopied=false;
  state.exprConcept=BOOK[idx].concepts[Math.floor(Math.random()*BOOK[idx].concepts.length)];
  state.tdTab="reflections";state.tdExIdx=0;state.tdExShowSol=false;state.tdRefIdx=0;state.tdRefShowSol=false;
  state.page="lesson";render();
}

function nextStep(){
  const ns=state.stepIdx+1;
  if(ns>=state.steps.length){
    state.done[state.lessonIdx]=true;
    state.xp+=state.correct*10;
    markLessonSeen(BOOK[state.lessonIdx].id);
    state.page="done";render();
  } else {
    state.stepIdx=ns;
    state.cardFlipped=false;state.quizChosen=null;
    render();
  }
}

function flipCard(){state.cardFlipped=true;render();}

function cardNext(){addXP(5);nextStep();}

function chooseQuiz(i){
  const q=state.steps[state.stepIdx].q;
  state.quizChosen=i;
  state.total++;
  if(i===q.ans){state.correct++;addXP(10);}
  render();
}

function markLessonSeen(lessonId){
  SR_CARDS.filter(c=>c.lessonId===lessonId).forEach(c=>{
    if(!state.srData[c.id])state.srData[c.id]=srUpdate({easeFactor:2.5,lapses:0},"good");
  });
}

function startSR(){
  const due=getDueCards(SR_CARDS,state.srData);
  if(due.length===0){showToast("Aucune carte à revoir ! · لا بطاقات",GREEN);return;}
  state.srQueue=due.slice(0,20);state.srIdx=0;state.srSessionDone=false;state.srRevealed=false;state.srGradeToast=null;
  state.page="sr";render();
}

function revealSR(){state.srRevealed=true;render();}

function gradeSR(grade){
  const gradeInfo={
    again:{emoji:"🔴",labelFr:"À revoir",labelAr:"مجدداً",color:RED,toastFr:"Pas de souci ! On revient dessus.",toastAr:"لا بأس! سنعود إليه.",nextFr:"Revient dans cette session",nextAr:"يعود في هذه الجلسة"},
    hard:{emoji:"🟡",labelFr:"Difficile",labelAr:"صعب",color:GOLD,toastFr:"Noté ! Révision demain.",toastAr:"حسناً! مراجعة غداً.",nextFr:"Prochain rappel : demain",nextAr:"المراجعة التالية: غداً"},
    good:{emoji:"🔵",labelFr:"Bien",labelAr:"جيد",color:A,toastFr:"Bien joué ! +3j de pause.",toastAr:"أحسنت! +3 أيام.",nextFr:"Prochain rappel : dans 3 jours",nextAr:"المراجعة التالية: بعد 3 أيام"},
    easy:{emoji:"🟢",labelFr:"Facile",labelAr:"سهل",color:GREEN,toastFr:"Excellent ! Tu maîtrises ça.",toastAr:"ممتاز! أتقنت هذا المفهوم.",nextFr:"Prochain rappel : dans 7 jours",nextAr:"المراجعة التالية: بعد 7 أيام"},
  };
  const card=state.srQueue[state.srIdx];
  state.srData[card.id]=srUpdate(state.srData[card.id]||{easeFactor:2.5,lapses:0},grade);
  state.srGradeToast={...gradeInfo[grade],grade};
  if(grade==="again")state.srQueue=[...state.srQueue,card];
  render();
  setTimeout(()=>{
    state.srGradeToast=null;state.srRevealed=false;
    const nextIdx=state.srIdx+1;
    if(nextIdx>=state.srQueue.length){state.srSessionDone=true;state.xp+=state.srQueue.length*3;}
    else state.srIdx=nextIdx;
    render();
  },1100);
}

// Chat actions
function buildChatPrompt(){
  const text=document.getElementById("chatText")?.value||state.chatText;
  state.chatText=text;
  if(!text.trim()){showToast("Entrez une question · اكتب سؤالاً",RED);return;}
  const L=BOOK[state.lessonIdx];
  const concepts=L.concepts.map(c=>`- ${c.fr} (${c.ar}): ${c.df}`).join("\n");
  state.chatPrompt=`Tu es un expert pédagogue en Systèmes d'Information basé sur le livre "Introduction aux Systèmes d'Information" (Pages Bleues).\n\nConcepts de la leçon :\n${concepts}\n\nQuestion : ${text}\n\nRéponds en FRANÇAIS avec traduction arabe des points clés. Exemple concret obligatoire. Max 200 mots.`;
  state.chatCopied=false;render();
}
function copyChatPrompt(){
  navigator.clipboard.writeText(state.chatPrompt).catch(()=>{
    const a=document.createElement("textarea");a.value=state.chatPrompt;document.body.appendChild(a);a.select();document.execCommand("copy");document.body.removeChild(a);
  });
  state.chatCopied=true;showToast("Copié → Collez dans Claude",GREEN);render();
}
function saveChatAnswer(){
  const text=document.getElementById("chatAnswer")?.value||state.chatAnswer;
  state.chatAnswer=text;
  if(!text.trim()){showToast("Collez la réponse d'abord",RED);return;}
  state.chatSaved=text;addXP(5);render();
}
function setChatSugg(i){
  const L=BOOK[state.lessonIdx];
  const suggs=[
    `Expliquez "${L.concepts[0]?.fr}" avec un exemple concret du monde réel`,
    `Différence entre "${L.concepts[0]?.fr}" et "${L.concepts[1]?.fr}" ?`,
    `Application de ces concepts dans une entreprise moderne ?`
  ];
  state.chatText=suggs[i];render();
  setTimeout(()=>{const el=document.getElementById("chatText");if(el)el.value=suggs[i];},0);
}

// Expr actions
function buildExprPrompt(){
  const text=document.getElementById("exprText")?.value||state.exprText;
  state.exprText=text;
  if(!text.trim()||text.length<15){showToast("Écrivez plus · اكتب أكثر",RED);return;}
  const c=state.exprConcept;
  state.exprPrompt=`Tu es un évaluateur pédagogique expert en Systèmes d'Information.\n\nConcept : "${c.fr}" (بالعربية: "${c.ar}")\nDéfinition correcte : "${c.df}"\n\nL'étudiant a écrit : "${text}"\n\nÉvalue en 3 points avec traduction arabe :\n1. ✓ Ce qui est juste\n2. ⚠ Ce qui manque\n3. 💡 Conseil pour améliorer\n\nSois encourageant et rigoureux. Max 150 mots.`;
  state.exprCopied=false;render();
}
function copyExprPrompt(){
  navigator.clipboard.writeText(state.exprPrompt).catch(()=>{
    const a=document.createElement("textarea");a.value=state.exprPrompt;document.body.appendChild(a);a.select();document.execCommand("copy");document.body.removeChild(a);
  });
  state.exprCopied=true;showToast("Collez dans Claude pour l'évaluation",GREEN);render();
}
function exprFinish(){addXP(15);nextStep();}

// TD actions
function tdFinish(){addXP(10);nextStep();}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
render();
</script>
